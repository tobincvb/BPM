<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nexus BPM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
select,input,textarea{font-family:inherit;}
#root{height:100vh;}
#err{display:none;padding:40px;font-family:monospace;color:red;white-space:pre-wrap;font-size:13px;}
</style>
</head>
<body>
<div id="root"></div>
<div id="err"></div>
<script>
// localStorage storage shim
window.storage={
  get:k=>Promise.resolve((()=>{try{var v=localStorage.getItem('nx_'+k);return v?{value:v}:null;}catch(e){return null;}})()),
  set:(k,v)=>Promise.resolve((()=>{try{localStorage.setItem('nx_'+k,v);return{key:k,value:v};}catch(e){return null;}})()),
  delete:k=>Promise.resolve((()=>{try{localStorage.removeItem('nx_'+k);return{deleted:true};}catch(e){return null;}})()),
  list:()=>Promise.resolve({keys:[]})
};

// Load the JSX app file via fetch then transpile + eval
fetch(‘app.jsx’)
.then(r=>{
if(!r.ok)throw new Error(‘Could not load app.jsx — HTTP ‘+r.status);
return r.text();
})
.then(src=>{
try{
const code=Babel.transform(src,{presets:[‘react’]}).code;
// eslint-disable-next-line no-new-func
new Function(code)();
}catch(e){
showErr(‘Babel/runtime error:\n’+e.message+’\n’+(e.stack||’’));
}
})
.catch(e=>showErr(‘Fetch error:\n’+e.message));

function showErr(msg){
document.getElementById(‘root’).style.display=‘none’;
var el=document.getElementById(‘err’);
el.style.display=‘block’;
el.textContent=msg;
}
</script>

</body>
</html>
