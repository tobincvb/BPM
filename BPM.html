// localStorage-based storage shim (replaces Anthropic's window.storage for GitHub Pages)
window.storage = {
  get: (key) => Promise.resolve((() => { try { const v = localStorage.getItem('nexus_'+key); return v ? {value:v} : null; } catch(e) { return null; } })()),
  set: (key, val) => Promise.resolve((() => { try { localStorage.setItem('nexus_'+key, val); return {key, value:val}; } catch(e) { return null; } })()),
  delete: (key) => Promise.resolve((() => { try { localStorage.removeItem('nexus_'+key); return {key, deleted:true}; } catch(e) { return null; } })()),
  list: (prefix='') => Promise.resolve((() => { try { const keys=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('nexus_')&&k.slice(6).startsWith(prefix))keys.push(k.slice(6));} return {keys}; } catch(e) { return {keys:[]}; } })())
};

// ── Sparkline ──────────────────────────────────────────────────────────────────
function Sparkline({data,target,color,unit,label}){
if(!data||!data.length)return<div style={{fontSize:11,color:”#94a3b8”}}>No data</div>;
const vals=data.map(d=>d.value);
const mn=Math.min(…vals)*.9,mx=Math.max(…vals,target)*1.1;
const W=220,H=70;
const px=(v,i)=>(i/(data.length-1))*W;
const py=v=>H-(((v-mn)/(mx-mn))*H);
const pts=data.map((d,i)=>`${px(d.value,i)},${py(d.value)}`).join(” “);
const tY=py(target);
const last=vals[vals.length-1];
const good=unit===”%”?last>=target:last<=target;
return<div><div style={{display:“flex”,justifyContent:“space-between”,alignItems:“baseline”,marginBottom:4}}><span style={{fontSize:11,fontWeight:600,color:”#334155”}}>{label}</span><div style={{display:“flex”,alignItems:“baseline”,gap:5}}><span style={{fontSize:17,fontWeight:800,color:good?”#10b981”:”#ef4444”}}>{last}{unit}</span><span style={{fontSize:9,color:”#94a3b8”}}>target {target}{unit}</span></div></div><svg width={W} height={H} style={{display:“block”}}><line x1={0} y1={tY} x2={W} y2={tY} stroke="#e2e8f0" strokeWidth={1} strokeDasharray="3,3"/><polyline points={pts} fill=“none” stroke={color||”#6366f1”} strokeWidth={2}/>{data.map((d,i)=><circle key={i} cx={px(d.value,i)} cy={py(d.value)} r={3} fill={color||”#6366f1”}/>)}</svg><div style={{display:“flex”,justifyContent:“space-between”,marginTop:2}}><span style={{fontSize:9,color:”#94a3b8”}}>{data[0]?.date}</span><span style={{fontSize:9,color:”#94a3b8”}}>{data[data.length-1]?.date}</span></div></div>;
}

// ── Risk Matrix ────────────────────────────────────────────────────────────────

}

    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      {D.pages.find(p=>p.id===modal.item.id)&&<Btn out col="#ef4444" ch="Delete" onClick={()=>{upd("pages",p=>p.filter(x=>x.id!==modal.item.id));setModal(null);setPageView(null);}}/>}
      <Btn out ch="Cancel" onClick={()=>setModal(null)}/>
      <Btn ch="Save" onClick={()=>{const item={...modal.item,updatedAt:today()};const exists=D.pages.find(p=>p.id===item.id);if(exists)upd("pages",p=>p.map(x=>x.id===item.id?item:x));else upd("pages",p=>[...p,item]);setPageView(item);setModal(null);}}/>
    </div>
  </Modal>}

  {/* User Modal */}
  {modal?.type==="user"&&<Modal title={D.users.find(u=>u.id===modal.item.id)?"Edit User":"New User"} onClose={()=>setModal(null)}>
    <Fld label="Name"><input value={modal.item.name} onChange={e=>setModal(m=>({...m,item:{...m.item,name:e.target.value}}))} style={INP}/></Fld>
    <Fld label="Username"><input value={modal.item.username} onChange={e=>setModal(m=>({...m,item:{...m.item,username:e.target.value}}))} style={INP}/></Fld>
    <Fld label="Password"><input type="password" value={modal.item.password} onChange={e=>setModal(m=>({...m,item:{...m.item,password:e.target.value}}))} style={INP}/></Fld>
    <Fld label="Role"><select value={modal.item.role} onChange={e=>setModal(m=>({...m,item:{...m.item,role:e.target.value}}))} style={INP}><option value="user">User</option><option value="admin">Admin</option></select></Fld>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      {D.users.find(u=>u.id===modal.item.id)&&modal.item.id!==user?.id&&<Btn out col="#ef4444" ch="Delete" onClick={()=>{upd("users",p=>p.filter(x=>x.id!==modal.item.id));setModal(null);}}/>}
      <Btn out ch="Cancel" onClick={()=>setModal(null)}/>
      <Btn ch="Save" onClick={()=>{const exists=D.users.find(u=>u.id===modal.item.id);if(exists)upd("users",p=>p.map(x=>x.id===modal.item.id?modal.item:x));else upd("users",p=>[...p,{...modal.item,id:`U${uid()}`}]);setModal(null);}}/>
    </div>
  </Modal>}

  {/* RACI Modal */}
  {modal?.type==="raci"&&<Modal title="Assign RACI" onClose={()=>setModal(null)}>
    <Fld label="Person"><select value={modal.item.roleId} onChange={e=>setModal(m=>({...m,item:{...m.item,roleId:e.target.value}}))} style={INP}><option value="">— Select —</option>{D.people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Fld>
    <Fld label="Type"><select value={modal.item.type} onChange={e=>setModal(m=>({...m,item:{...m.item,type:e.target.value}}))} style={INP}>{RACI_T.map(t=><option key={t}>{t}</option>)}</select></Fld>
    <Fld label="Notes"><input value={modal.item.notes||""} onChange={e=>setModal(m=>({...m,item:{...m.item,notes:e.target.value}}))} style={INP}/></Fld>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      <Btn out ch="Cancel" onClick={()=>setModal(null)}/>
      <Btn ch="Save" onClick={()=>{upd("raci",p=>[...p,{...modal.item,id:uid()}]);setModal(null);}}/>
    </div>
  </Modal>}

  {/* Workflow Modal */}
  {modal?.type==="workflow"&&<Modal title={D.workflows.find(w=>w.id===modal.item.id)?"Edit Workflow":"New Workflow"} onClose={()=>setModal(null)}>
    <Fld label="Name"><input value={modal.item.name} onChange={e=>setModal(m=>({...m,item:{...m.item,name:e.target.value}}))} style={INP}/></Fld>
    <Fld label="Steps (comma-separated names)"><input value={(modal.item.steps||[]).map(s=>s.name).join(",")} onChange={e=>setModal(m=>({...m,item:{...m.item,steps:e.target.value.split(",").filter(Boolean).map((n,i)=>({id:`S${i+1}`,name:n.trim(),role:"Any"}))}})} style={INP} placeholder="Draft,Review,Approve,Publish"/></Fld>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      <Btn out ch="Cancel" onClick={()=>setModal(null)}/>
      <Btn ch="Save" onClick={()=>{const exists=D.workflows.find(w=>w.id===modal.item.id);if(exists)upd("workflows",p=>p.map(x=>x.id===modal.item.id?modal.item:x));else upd("workflows",p=>[...p,{...modal.item,id:`WF${uid()}`,instances:[]}]);setModal(null);}}/>
    </div>
  </Modal>}

  {/* Project Modal */}
  {modal?.type==="project"&&<Modal title="Project" onClose={()=>setModal(null)}>
    <Fld label="Title"><input value={modal.item.title} onChange={e=>setModal(m=>({...m,item:{...m.item,title:e.target.value}}))} style={INP}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="Status"><select value={modal.item.status} onChange={e=>setModal(m=>({...m,item:{...m.item,status:e.target.value}}))} style={INP}>{["Planning","Active","Completed","On Hold"].map(s=><option key={s}>{s}</option>)}</select></Fld>
      <Fld label="Owner"><select value={modal.item.owner} onChange={e=>setModal(m=>({...m,item:{...m.item,owner:e.target.value}}))} style={INP}><option value="">— Select —</option>{D.people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Fld>
    </div>
    <Fld label="Description"><textarea value={modal.item.description} onChange={e=>setModal(m=>({...m,item:{...m.item,description:e.target.value}}))} style={{...INP,height:70}}/></Fld>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      <Btn out ch="Cancel" onClick={()=>setModal(null)}/>
      <Btn ch="Save" onClick={()=>{const exists=D.projects.find(p=>p.id===modal.item.id);if(exists)upd("projects",p=>p.map(x=>x.id===modal.item.id?modal.item:x));else upd("projects",p=>[...p,modal.item]);setModal(null);}}/>
    </div>
  </Modal>}

  {/* Person Profile Modal */}
  {personSel&&<Modal title="Profile" onClose={()=>setPersonSel(null)}>
    <div style={{textAlign:"center",marginBottom:16}}><div style={{width:56,height:56,borderRadius:"50%",background:PG,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:18,margin:"0 auto 8px"}}>{personSel.avatar||personSel.name[0]}</div><div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{personSel.name}</div><div style={{fontSize:12,color:"#64748b"}}>{personSel.title} · {personSel.dept}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
      <div style={{fontSize:11,color:"#64748b"}}>📧 {personSel.email}</div>
      <div style={{fontSize:11,color:"#64748b"}}>📍 {personSel.location}</div>
    </div>
    {personSel.bio&&<p style={{fontSize:12,color:"#64748b",marginBottom:10}}>{personSel.bio}</p>}
    {personSel.skills?.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{personSel.skills.map(s=><Bdg key={s} v={s} c="#6366f1"/>)}</div>}
    <div style={{display:"flex",justifyContent:"flex-end"}}><Btn out ch="Close" onClick={()=>setPersonSel(null)}/></div>
  </Modal>}

</div>
```

);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
