<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nexus BPM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
select,input,textarea{font-family:inherit;}
#root{height:100vh;}
#err{display:none;padding:40px;font-family:monospace;color:red;white-space:pre-wrap;font-size:13px;}
</style>
</head>
<body>
<div id="root"></div>
<div id="err"></div>
<script>
// localStorage storage shim
window.storage={
  get:function(k){return Promise.resolve((function(){try{var v=localStorage.getItem('nx_'+k);return v?{value:v}:null;}catch(e){return null;}}()));},
  set:function(k,v){return Promise.resolve((function(){try{localStorage.setItem('nx_'+k,v);return{key:k,value:v};}catch(e){return null;}}()));},
  delete:function(k){return Promise.resolve((function(){try{localStorage.removeItem('nx_'+k);return{deleted:true};}catch(e){return null;}}()));},
  list:function(){return Promise.resolve({keys:[]});}
};

function showErr(msg){
document.getElementById(‘root’).style.display=‘none’;
var el=document.getElementById(‘err’);
el.style.display=‘block’;
el.textContent=msg;
}

// Fetch app.jsx, transpile with Babel, inject as a script tag
fetch(‘app.jsx’)
.then(function(r){
if(!r.ok) throw new Error(‘Could not load app.jsx — HTTP ‘+r.status);
return r.text();
})
.then(function(src){
try{
var code = Babel.transform(src, {presets:[‘react’]}).code;
var script = document.createElement(‘script’);
script.textContent = code;
document.body.appendChild(script);
} catch(e){
showErr(‘Babel error:\n’+e.message+’\n’+(e.stack||’’));
}
})
.catch(function(e){ showErr(‘Fetch error:\n’+e.message); });
</script>

</body>
</html>
