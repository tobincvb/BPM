<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nexus BPM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;height:100vh;overflow:hidden;color:#1e293b;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
input,select,textarea,button{font-family:inherit;}
.hidden{display:none!important;}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;}
#header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:white;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05);flex-shrink:0;gap:8px;}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);}
.login-box{background:white;border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.35);padding:36px;width:380px;}
.login-logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 10px;}

/* Tabs */
#tab-bar{display:flex;gap:1px;background:#f1f5f9;border-radius:7px;padding:2px;overflow-x:auto;max-width:60vw;}
.tab-btn{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;border:none;cursor:pointer;background:transparent;color:#64748b;white-space:nowrap;}
.tab-btn.active{background:white;color:#6366f1;box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* Sub nav */
.subnav{display:flex;gap:2px;border-bottom:1px solid #e2e8f0;padding:0 16px;background:white;flex-shrink:0;}
.subnav-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-1px;}
.subnav-btn.active{color:#6366f1;border-bottom-color:#6366f1;}

/* Cards */
.card{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-card{display:flex;align-items:center;gap:8px;padding:12px!important;}

/* Badge */
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}

/* Buttons */
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;white-space:nowrap;}
.btn-sm{padding:4px 10px;font-size:10px;}
.btn-outline{background:white;border:1px solid #e2e8f0;color:#6366f1;}
.btn-danger{background:white;border:1px solid #e2e8f0;color:#ef4444;}
.btn:disabled{background:#f1f5f9;color:#94a3b8;cursor:not-allowed;}

/* Form */
.field{margin-bottom:13px;}
.field label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}
.inp{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;background:white;outline:none;}
.inp:focus{border-color:#6366f1;}
textarea.inp{resize:vertical;}

/* Sidebar layout */
.sidebar-layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;background:white;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:10px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;}
.sidebar-list{flex:1;overflow-y:auto;padding:6px 0;}
.sidebar-item{padding:7px 12px;cursor:pointer;border-left:3px solid transparent;}
.sidebar-item:hover{background:#f8fafc;}
.sidebar-item.active{background:#f5f3ff;border-left-color:#6366f1;}
.detail-panel{flex:1;overflow-y:auto;padding:16px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl th{text-align:left;padding:7px 12px;font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;white-space:nowrap;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.tbl td{padding:7px 12px;color:#334155;border-bottom:1px solid #f1f5f9;}
.tbl tr:nth-child(even) td{background:#fafafa;}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:white;border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.25);width:480px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-box.wide{width:700px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.modal-body{overflow-y:auto;padding:20px;flex:1;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Notification dropdown */
#notif-dropdown{position:absolute;right:0;top:calc(100% + 6px);width:280px;background:white;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid #e2e8f0;z-index:100;padding:8px 0;}
.notif-item{display:flex;gap:8px;padding:8px 14px;cursor:pointer;}
.notif-item:hover{background:#f8fafc;}

/* Search overlay */
#search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;}
#search-box{width:560px;background:white;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
#search-input-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;}
#search-input{flex:1;border:none;outline:none;font-size:14px;color:#1e293b;}

/* Board */
.board{display:flex;gap:0;overflow-x:auto;height:100%;}
.board-col{flex:0 0 220px;background:#f8fafc;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;}
.board-col-header{padding:10px 12px;border-bottom:1px solid #e2e8f0;background:white;flex-shrink:0;}
.board-col-body{flex:1;overflow-y:auto;padding:8px;}
.issue-card{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:10px;margin-bottom:6px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.issue-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);}

/* Map */
#map-container{flex:1;position:relative;overflow:hidden;background:#f8fafc;}
#map-svg{width:100%;height:100%;cursor:grab;}
#map-panel{position:absolute;right:0;top:0;bottom:0;width:260px;background:white;border-left:1px solid #e2e8f0;padding:14px;overflow-y:auto;}

/* Sparkline */
.sparkline-wrap{margin-bottom:14px;}

/* Preview banner */
#preview-banner{background:linear-gradient(90deg,#f59e0b,#d97706);padding:5px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

/* Org chart */
.org-node{background:white;border:2px solid #e2e8f0;border-radius:10px;padding:8px 14px;text-align:center;min-width:130px;box-shadow:0 2px 6px rgba(0,0,0,.06);cursor:pointer;display:inline-block;}
.org-node:hover{border-color:#6366f1;}
.org-wrap{display:flex;flex-direction:column;align-items:center;}
.org-children{display:flex;gap:14px;margin-top:8px;align-items:flex-start;}

/* Avatar */
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:10px;cursor:pointer;flex-shrink:0;}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:24px;">
      <div class="login-logo">⬡</div>
      <h1 style="font-weight:900;font-size:20px;margin:0 0 4px;">Nexus Enterprise</h1>
      <p style="font-size:12px;color:#64748b;">Business Process Management Platform</p>
    </div>
    <div class="field"><label>Username</label><input class="inp" id="login-user" placeholder="e.g. sarah.chen" style="font-size:14px;padding:10px 13px;"/></div>
    <div class="field"><label>Password</label><input class="inp" id="login-pass" type="password" style="font-size:14px;padding:10px 13px;"/></div>
    <div id="login-err" style="font-size:12px;color:#ef4444;margin-bottom:8px;font-weight:600;display:none;"></div>
    <button class="btn" style="width:100%;padding:11px;font-size:14px;" onclick="doLogin()">Sign In →</button>
    <div style="margin-top:16px;padding:12px;background:#f8fafc;border-radius:9px;border:1px solid #e2e8f0;">
      <p style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin:0 0 7px;">Demo Accounts</p>
      <div id="demo-accounts"></div>
    </div>
  </div>
</div>

<!-- APP -->

<div id="app" class="hidden">
  <div id="preview-banner" class="hidden">
    <span style="font-size:11px;color:white;font-weight:600;">👁 Previewing as User</span>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.25);color:white;border:none;" onclick="exitPreview()">Exit Preview</button>
  </div>
  <div id="header">
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div style="width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;">⬡</div>
      <span style="font-weight:800;font-size:13px;">Nexus</span>
      <span id="role-badge" class="badge"></span>
      <span id="save-msg" style="font-size:10px;color:#10b981;display:none;">Saved ✓</span>
    </div>
    <div id="tab-bar"></div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <button class="btn btn-outline btn-sm" onclick="toggleSearch()">🔍 <span style="font-size:9px;background:#e2e8f0;padding:1px 4px;border-radius:3px;">⌘K</span></button>
      <div style="position:relative;">
        <button id="notif-btn" class="btn btn-outline btn-sm" onclick="toggleNotifs()">🔔 <span id="notif-count" class="hidden" style="font-size:9px;background:#ef4444;color:white;border-radius:10px;padding:1px 4px;font-weight:700;margin-left:2px;"></span></button>
        <div id="notif-dropdown" class="hidden"></div>
      </div>
      <div id="user-avatar" class="avatar" onclick="showProfile()"></div>
      <button class="btn btn-outline btn-sm" onclick="logout()">↩</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->

<div id="modal-overlay" class="hidden" onclick="closeModalOverlay(event)">
  <div id="modal-box" class="modal-box">
    <div class="modal-header">
      <span id="modal-title" style="font-weight:700;font-size:14px;"></span>
      <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;font-size:18px;color:#94a3b8;line-height:1;">×</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- SEARCH -->

<div id="search-overlay" class="hidden" onclick="closeSearchOverlay(event)">
  <div id="search-box">
    <div id="search-input-row">
      <span>🔍</span>
      <input id="search-input" placeholder="Search processes, policies, risks, incidents…" oninput="renderSearch()"/>
      <span style="font-size:10px;color:#94a3b8;background:#f1f5f9;padding:2px 6px;border-radius:4px;">ESC</span>
    </div>
    <div id="search-results"></div>
  </div>
</div>

// ─── Auth ─────────────────────────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const user = D.users.find(x => x.username===u && x.password===p);
  if (!user) { const e=document.getElementById('login-err'); e.textContent='Invalid credentials.'; e.style.display='block'; return; }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  initApp();
}
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function logout() { currentUser=null; isPreview=false; document.getElementById('login-screen').style.display='flex'; document.getElementById('app').classList.add('hidden'); }
function exitPreview() { isPreview=false; document.getElementById('preview-banner').classList.add('hidden'); setTab('Processes'); }
const getRole = () => isPreview ? 'user' : (currentUser?.role||'user');
const canEdit = () => getRole()==='admin';

function initApp() {
  load();
  renderDemoAccounts();

  // Wire up login button and enter key properly
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  renderHeader();
  setTab('Processes');
  document.addEventListener('keydown', e => {
    if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); toggleSearch(); }
    if (e.key==='Escape') { closeModal(); closeSearch(); showNotifsOpen=false; document.getElementById('notif-dropdown').classList.add('hidden'); }
  });
}

function renderDemoAccounts() {
  const demos = [
    {l:'Admin',u:'sarah.chen',p:'admin123',c:'#6366f1'},
    {l:'Admin',u:'admin',p:'admin',c:'#6366f1'},
    {l:'User',u:'tom.nguyen',p:'user123',c:'#10b981'}

  const container = document.getElementById('demo-accounts');
  container.innerHTML = demos.map((d,i) =>

      <span style="font-size:11px;color:#334155;">${d.u} / ${d.p}</span>${badge(d.l,d.c)}</div>`

  container.querySelectorAll('[data-di]').forEach(el => {

function renderHeader() {
  const role = getRole();
  const tabs = role==='admin' ? ADMIN_TABS : USER_TABS;
  document.getElementById('role-badge').innerHTML = badge(role==='admin'?'ADMIN':'USER', role==='admin'?'#6366f1':'#10b981');
  document.getElementById('tab-bar').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
  const me = D.people.find(p=>p.id===currentUser?.personId) || D.people[0];
  document.getElementById('user-avatar').textContent = me?.avatar||me?.name?.[0]||'U';
  renderNotifs();
}

function setTab(t) {
  activeTab = t;
  renderHeader();
  render();
}

// ─── Notifications ────────────────────────────────────────────────────────────
function getNotifs() {
  const n = [];
  D.processes.filter(p=>p.nextReview&&p.nextReview<=today()).forEach(p=>n.push({icon:'📋',title:'Process review overdue',body:p.title,go:`procGoTo('${p.id}')`}));
  D.policies.filter(p=>p.reviewDate&&p.reviewDate<=today()).forEach(p=>n.push({icon:'📜',title:'Policy review overdue',body:p.title,go:`polGoTo('${p.id}')`}));
  D.obligations.filter(o=>o.complianceStatus!=='Compliant').forEach(o=>n.push({icon:'⚖️',title:'Obligation not compliant',body:o.title,go:`oblGoTo('${o.id}')`}));
  D.incidents.filter(i=>i.priority==='Critical'&&!['Resolved','Closed'].includes(i.state)).forEach(i=>n.push({icon:'🚨',title:'Critical incident open',body:i.title,go:`setTab('ITSM')`}));
  return n;
}
function renderNotifs() {
  const n = getNotifs();
  const cnt = document.getElementById('notif-count');
  if(n.length>0){cnt.textContent=n.length;cnt.classList.remove('hidden');}else{cnt.classList.add('hidden');}
  document.getElementById('notif-dropdown').innerHTML = n.length===0
    ? '<div style="padding:16px;text-align:center;font-size:11px;color:#94a3b8;">All clear ✓</div>'
    : n.map(x=>`<div class="notif-item" onclick="${x.go};toggleNotifs()"><span style="font-size:14px;">${x.icon}</span><div><div style="font-size:11px;font-weight:600;color:#334155;">${esc(x.title)}</div><div style="font-size:10px;color:#64748b;">${esc(x.body)}</div></div></div>`).join('');
}
function toggleNotifs() { showNotifsOpen=!showNotifsOpen; document.getElementById('notif-dropdown').classList.toggle('hidden',!showNotifsOpen); }
function procGoTo(id) { procSel=D.processes.find(p=>p.id===id); activeSubViews.Processes='List'; setTab('Processes'); }
function polGoTo(id)  { polSel=D.policies.find(p=>p.id===id); setTab('Policies'); }
function oblGoTo(id)  { oblSel=D.obligations.find(o=>o.id===id); setTab('Obligations'); }
function showProfile() { const me=D.people.find(p=>p.id===currentUser?.personId)||D.people[0]; openPersonModal(me); }

// ─── Search ───────────────────────────────────────────────────────────────────
function toggleSearch() { document.getElementById('search-overlay').classList.toggle('hidden'); document.getElementById('search-input').value=''; renderSearch(); setTimeout(()=>document.getElementById('search-input').focus(),50); }
function closeSearch() { document.getElementById('search-overlay').classList.add('hidden'); }
function closeSearchOverlay(e) { if(e.target===document.getElementById('search-overlay')) closeSearch(); }
function renderSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const el = document.getElementById('search-results');
  if(!q){el.innerHTML='<div style="padding:16px;display:flex;gap:7px;flex-wrap:wrap;">'+['processes','policies','risks','incidents'].map(s=>`<button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='${s}';renderSearch()">${s}</button>`).join('')+'</div>';return;}
  const res=[];
  D.processes.forEach(x=>{if(x.title.toLowerCase().includes(q))res.push({icon:'📋',type:'Process',title:x.title,go:`procGoTo('${x.id}');closeSearch()`});});
  D.policies.forEach(x=>{if(x.title.toLowerCase().includes(q))res.push({icon:'📜',type:'Policy',title:x.title,go:`polGoTo('${x.id}');closeSearch()`});});
  D.obligations.forEach(x=>{if(x.title.toLowerCase().includes(q))res.push({icon:'⚖️',type:'Obligation',title:x.title,go:`oblGoTo('${x.id}');closeSearch()`});});
  D.risks.forEach(x=>{if(x.title.toLowerCase().includes(q))res.push({icon:'⚠️',type:'Risk',title:x.title,go:`riskSel=D.risks.find(r=>r.id==='${x.id}');setTab('Risks');closeSearch()`});});
  D.incidents.forEach(x=>{if(x.title.toLowerCase().includes(q))res.push({icon:'🚨',type:'Incident',title:x.title,go:`setTab('ITSM');closeSearch()`});});
  const top=res.slice(0,10);
  el.innerHTML=top.length ? top.map(r=>`<div onclick="${r.go}" style="display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'"><span style="font-size:14px;width:20px;text-align:center;">${r.icon}</span><span style="font-size:12px;font-weight:500;color:#334155;flex:1;">${esc(r.title)}</span>${badge(r.type,'#6366f1')}</div>`).join('')
    : `<div style="padding:22px;text-align:center;color:#94a3b8;font-size:12px;">No results for "${esc(q)}"</div>`;
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function render() {
  renderNotifs();
  const c = document.getElementById('content');
  const t = activeTab;
  if(t==='Processes') renderProcesses(c);
  else if(t==='Policies') renderPolicies(c);
  else if(t==='Obligations') renderObligations(c);
  else if(t==='Risks') renderRisks(c);
  else if(t==='ITSM') renderITSM(c);
  else if(t==='Projects') renderProjects(c);
  else if(t==='Learning') renderLearning(c);
  else if(t==='Reports') renderReports(c);
  else if(t==='Audit') renderAudit(c);
  else if(t==='Dashboard') renderDashboard(c);
  else if(t==='Admin') renderAdmin(c);
  else c.innerHTML='<div style="padding:40px;color:#94a3b8;">Coming soon</div>';
  bindMapEvents();
}

function barHTML(pct,color,h=6){ return `<div style="height:${h}px;background:#f1f5f9;border-radius:${h/2}px;overflow:hidden;"><div style="height:100%;background:${color||'#6366f1'};width:${Math.min(100,Math.max(0,pct||0))}%;border-radius:${h/2}px;transition:width .4s;"></div></div>`; }
function sparklineHTML(kpi) {
  if(!kpi.history||!kpi.history.length) return '<div style="font-size:11px;color:#94a3b8;">No data</div>';
  const vals=kpi.history.map(d=>d.value);
  const mn=Math.min(...vals)*.9, mx=Math.max(...vals,kpi.target)*1.1;
  const W=220,H=70;
  const px=(_,i)=>(i/(kpi.history.length-1))*W;
  const py=v=>H-(((v-mn)/(mx-mn))*H);
  const pts=kpi.history.map((d,i)=>`${px(d.value,i)},${py(d.value)}`).join(' ');
  const tY=py(kpi.target);
  const last=vals[vals.length-1];
  const good=kpi.unit==='%'?last>=kpi.target:last<=kpi.target;
  return `<div class="sparkline-wrap">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
      <span style="font-size:11px;font-weight:600;color:#334155;">${esc(kpi.name)}</span>
      <div style="display:flex;align-items:baseline;gap:5px;"><span style="font-size:17px;font-weight:800;color:${good?'#10b981':'#ef4444'};">${last}${esc(kpi.unit)}</span><span style="font-size:9px;color:#94a3b8;">target ${kpi.target}${esc(kpi.unit)}</span></div>
    </div>
    <svg width="${W}" height="${H}" style="display:block;">
      <line x1="0" y1="${tY}" x2="${W}" y2="${tY}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
      <polyline points="${pts}" fill="none" stroke="#6366f1" stroke-width="2"/>
      ${kpi.history.map((d,i)=>`<circle cx="${px(d.value,i)}" cy="${py(d.value)}" r="3" fill="#6366f1"/>`).join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:2px;"><span style="font-size:9px;color:#94a3b8;">${kpi.history[0].date}</span><span style="font-size:9px;color:#94a3b8;">${kpi.history[kpi.history.length-1].date}</span></div>
  </div>`;
}

function peopleOpts(val,blank='— Select —') { return `<option value="">${blank}</option>`+D.people.map(p=>`<option value="${p.id}" ${p.id===val?'selected':''}>${esc(p.name)}</option>`).join(''); }

function drawMap() {
  const g = document.getElementById('map-g'); if(!g)return;
  const lines = D.elements.map(el=>(el.links||[]).map(lid=>{
    const t=D.elements.find(e=>e.id===lid); if(!t) return '';
    return `<line x1="${el.x+NODE_W/2}" y1="${el.y+NODE_H/2}" x2="${t.x+NODE_W/2}" y2="${t.y+NODE_H/2}" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>`;
  }).join('')).join('');
  const nodes = D.elements.map(el=>{
    const col=EL_COLORS[el.type]||'#64748b'; const sel=mapSelId===el.id;
    return `<g id="node-${el.id}" style="cursor:pointer;" onclick="mapClickEl('${el.id}',event)" onmousedown="nodeDown('${el.id}',event)" onmousemove="nodeMove('${el.id}',event)" onmouseup="nodeUp('${el.id}',event)">
      <rect x="${el.x}" y="${el.y}" width="${NODE_W}" height="${NODE_H}" rx="8" fill="white" stroke="${sel?col:'#e2e8f0'}" stroke-width="${sel?2:1}" filter="url(#sh)"/>
      <rect x="${el.x}" y="${el.y}" width="4" height="${NODE_H}" rx="2" fill="${col}"/>
      <text x="${el.x+14}" y="${el.y+18}" font-size="9" fill="${col}" font-weight="700">${(el.type||'').toUpperCase()}</text>
      <text x="${el.x+14}" y="${el.y+33}" font-size="11" fill="#1e293b" font-weight="600">${esc((el.label||'').slice(0,18))}</text>
    </g>`;
  }).join('');
  g.innerHTML = `<g transform="translate(${mapPan.x},${mapPan.y}) scale(${mapZoom})">${lines}${nodes}</g>`;
}

let nodeDragging = null, nodeDragStart = {mx:0,my:0,ex:0,ey:0}, nodeMoved = false;
function nodeDown(id,e){if(!canEdit())return;e.stopPropagation();nodeDragging=id;nodeMoved=false;nodeDragStart={mx:e.clientX,my:e.clientY,ex:D.elements.find(x=>x.id===id).x,ey:D.elements.find(x=>x.id===id).y};}
function nodeMove(id,e){if(!nodeDragging||nodeDragging!==id)return;e.stopPropagation();const dx=(e.clientX-nodeDragStart.mx)/mapZoom,dy=(e.clientY-nodeDragStart.my)/mapZoom;if(Math.abs(dx)>3||Math.abs(dy)>3)nodeMoved=true;const el=D.elements.find(x=>x.id===id);if(el&&nodeMoved){el.x=nodeDragStart.ex+dx;el.y=nodeDragStart.ey+dy;drawMap();}}
function nodeUp(id,e){if(nodeDragging===id){if(nodeMoved){e.stopPropagation();save();}nodeDragging=null;}}
function mapClickEl(id,e){if(nodeMoved)return;if(linkingMode&&linkFrom){if(id!==linkFrom){const el=D.elements.find(x=>x.id===linkFrom);if(el){el.links=el.links||[];if(!el.links.includes(id))el.links.push(id);save();drawMap();}linkingMode=false;linkFrom=null;}return;}mapSelId=id===mapSelId?null:id;if(mapSelId){mapElEdit={...D.elements.find(x=>x.id===id)};mapPanelOpen=true;}else{mapPanelOpen=false;}render();}
function addMapEl(type){const id=`E${uid()}`;D.elements.push({id,type,label:`New ${type}`,x:120+Math.random()*200,y:100+Math.random()*150,lane:'Operations',links:[]});save();render();}
function toggleLinking(){linkingMode=!linkingMode;if(linkingMode){linkFrom=mapSelId;}else{linkFrom=null;}render();}
function saveMapEl(){if(!mapElEdit)return;const idx=D.elements.findIndex(x=>x.id===mapElEdit.id);if(idx>=0)D.elements[idx]={...D.elements[idx],...mapElEdit};save();mapPanelOpen=false;render();}
function deleteMapEl(){if(!mapElEdit)return;D.elements=D.elements.filter(x=>x.id!==mapElEdit.id).map(x=>({...x,links:(x.links||[]).filter(l=>l!==mapElEdit.id)}));mapSelId=null;mapPanelOpen=false;mapElEdit=null;save();render();}
function mapMD(e){if(e.target.id==='map-svg'||e.target.closest('#map-svg')===e.target){mapPanning=true;mapPanStart={x:e.clientX-mapPan.x,y:e.clientY-mapPan.y};}}
function mapMM(e){if(mapPanning)setPan(e.clientX-mapPanStart.x,e.clientY-mapPanStart.y);}
function mapMU(){mapPanning=false;}
function mapWheel(e){e.preventDefault();mapZoom=Math.max(.25,Math.min(3,mapZoom-e.deltaY*.001));drawMap();}
function setPan(x,y){mapPan={x,y};drawMap();}
function bindMapEvents(){}

  let detail=`<div style="padding:16px;"><h2 style="font-weight:700;font-size:14px;margin-bottom:12px;">Risk Matrix</h2>${riskMatrixHTML()}</div>`;
  if(riskSel){const r=D.risks.find(x=>x.id===riskSel.id)||riskSel;const sc=rScore(r.likelihood,r.impact);const lv=rLevel(sc);detail=`<div style="max-width:700px;"><div class="card" style="margin-bottom:12px;"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;"><div><h2 style="font-weight:800;font-size:16px;margin:0 0 4px;">${esc(r.title)}</h2><div style="display:flex;gap:5px;">${badge(lv,PC(lv))}${badge('Score: '+sc,'#94a3b8')}${badge(r.status,SC(r.status))}</div></div>${canEdit()?`<button class="btn btn-outline btn-sm" onclick="openRiskModal('${r.id}')">✏️ Edit</button>`:''}</div><div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;"><div><div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Likelihood</div><div style="font-size:12px;font-weight:600;">${esc(r.likelihood)}</div></div><div><div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Impact</div><div style="font-size:12px;font-weight:600;">${esc(r.impact)}</div></div><div><div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Owner</div><div style="font-size:12px;font-weight:600;">${esc(pOwner(r.owner))}</div></div></div><p style="font-size:13px;color:#64748b;margin:0 0 10px;">${esc(r.description)}</p>${r.treatments?.length?`<div><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:5px;">Treatments</div>${r.treatments.map(t=>`<div style="font-size:12px;color:#334155;padding:3px 0;border-bottom:1px solid #f1f5f9;">• ${esc(t)}</div>`).join('')}</div>`:''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div class="card"><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Residual Risk</div><div style="display:flex;gap:10px;"><div><div style="font-size:9px;color:#94a3b8;">Likelihood</div><div style="font-size:12px;font-weight:700;">${esc(r.residualLikelihood)}</div></div><div><div style="font-size:9px;color:#94a3b8;">Impact</div><div style="font-size:12px;font-weight:700;">${esc(r.residualImpact)}</div></div></div></div><div class="card"><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Linked Processes</div>${D.processes.filter(p=>(r.linkedProcessIds||[]).includes(p.id)).map(p=>`<div onclick="procSel=D.processes.find(x=>x.id==='${p.id}');setTab('Processes')" style="font-size:11px;padding:3px 8px;border-radius:6px;background:#f5f3ff;color:#4338ca;margin-bottom:3px;cursor:pointer;">${esc(p.title)}</div>`).join('')}</div></div></div>`;}
  c.innerHTML=sidebarLayout(sidebar,detail);

function riskMatrixHTML(){
  const rows=[...RISK_L].reverse().map(l=>`<tr><th style="padding:4px 8px;font-weight:700;color:#64748b;text-align:right;font-size:9px;white-space:nowrap;">${l}</th>${RISK_I.map(i=>{const sc=rScore(l,i);const lv=rLevel(sc);const tc={Critical:'#ef4444',High:'#f59e0b',Medium:'#6366f1',Low:'#10b981'}[lv];const rs=D.risks.filter(r=>r.likelihood===l&&r.impact===i&&r.status!=='Closed');return`<td style="border:1px solid #e2e8f0;width:80px;vertical-align:top;background:${tc}10;cursor:${rs.length?'pointer':'default'};padding:4px;" onclick="${rs.length?`riskSel=D.risks.find(x=>x.id==='${rs[0].id}');render()`:''}'">${rs.map(r=>`<div title="${esc(r.title)}" style="font-size:9px;background:${tc}20;color:${tc};border-radius:4px;padding:1px 4px;margin-bottom:2px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px;">${esc(r.title.slice(0,14))}</div>`).join('')}</td>`;}).join('')}</tr>`).join('');
  return`<div style="overflow-x:auto;"><table style="border-collapse:collapse;font-size:10px;"><thead><tr><td style="padding:4px 8px;font-weight:700;color:#64748b;font-size:9px;text-align:right;">Impact →<br/>Likelihood ↓</td>${RISK_I.map(i=>`<th style="padding:4px 6px;font-weight:700;color:#64748b;text-align:center;width:80px;">${i}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function exportCSV(type){
  let rows=[],name=type;
  if(type==='processes') rows=D.processes.map(p=>({id:p.id,title:p.title,level:p.level,status:p.status,maturity:p.maturity,owner:pOwner(p.owner),version:p.version,nextReview:p.nextReview||''}));
  else if(type==='risks') rows=D.risks.map(r=>({id:r.id,title:r.title,likelihood:r.likelihood,impact:r.impact,score:rScore(r.likelihood,r.impact),level:rLevel(rScore(r.likelihood,r.impact)),status:r.status}));
  else if(type==='obligations') rows=D.obligations.map(o=>({id:o.id,title:o.title,type:o.type,regulator:o.regulator,status:o.complianceStatus}));
  if(!rows.length) return;
  const keys=Object.keys(rows[0]);
  const csv=[keys,...rows.map(r=>keys.map(k=>`"${String(r[k]||'').replace(/"/g,'""').replace(/\n/g,' ')}"`))].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`${name}.csv`; a.click();
}
